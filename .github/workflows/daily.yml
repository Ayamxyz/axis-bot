name: AXIS Morning Briefing

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 AM UTC = 7:00 AM Nigeria (WAT, UTC+1)
  workflow_dispatch:      # allows manual trigger from GitHub UI anytime

jobs:
  run-axis:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # increased — web search adds time per section

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Google service account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SA_JSON" > axis-bot-service-account.json

      - name: Verify service account file
        run: |
          if [ -f axis-bot-service-account.json ]; then
            echo "Service account file created"
            python3 -c "import json; json.load(open('axis-bot-service-account.json')); print('Valid JSON confirmed')"
          else
            echo "Service account file missing"
            exit 1
          fi

      - name: Run AXIS
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEFING_WEBHOOK:            ${{ secrets.BRIEFING_WEBHOOK }}
          JOBS_WEBHOOK:                ${{ secrets.JOBS_WEBHOOK }}
          CONTENT_WEBHOOK:             ${{ secrets.CONTENT_WEBHOOK }}
          FOLLOWUPS_WEBHOOK:           ${{ secrets.FOLLOWUPS_WEBHOOK }}
          SCHOLARSHIPS_WEBHOOK:        ${{ secrets.SCHOLARSHIPS_WEBHOOK }}
          LEADERSHIP_WEBHOOK:          ${{ secrets.LEADERSHIP_WEBHOOK }}
          CERTIFICATIONS_WEBHOOK:      ${{ secrets.CERTIFICATIONS_WEBHOOK }}
          GMAIL_ADDRESS:               ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT:      axis-bot-service-account.json
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          NOTION_TOKEN:                ${{ secrets.NOTION_TOKEN }}
          NOTION_CLIENT_TRACKER_ID:    ${{ secrets.NOTION_CLIENT_TRACKER_ID }}
          NOTION_CONTENT_CALENDAR_ID:  ${{ secrets.NOTION_CONTENT_CALENDAR_ID }}
          NOTION_SCHOLARSHIP_ID:       ${{ secrets.NOTION_SCHOLARSHIP_ID }}
          NOTION_TASK_MANAGER_ID:      ${{ secrets.NOTION_TASK_MANAGER_ID }}
          NOTION_CERT_ROADMAP_ID:      ${{ secrets.NOTION_CERT_ROADMAP_ID }}
        run: python run.py